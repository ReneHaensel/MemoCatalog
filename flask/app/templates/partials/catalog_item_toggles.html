{% if current_user.is_authenticated and not current_user.is_admin %}
  {% set toggle_mode = toggle_mode|default("card") %}
  <div class="flex {{ 'flex-nowrap items-center gap-2 whitespace-nowrap' if toggle_mode == 'table' else 'flex-wrap gap-3' }} text-sm text-slate-700">
    <form method="post" action="{{ url_for('catalog.toggle_collection', note_id=note.id) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="next" value="{{ request.full_path }}">
      <label class="inline-flex items-center gap-2">
        <input
          class="h-4 w-4 rounded border-slate-300 text-emerald-700"
          type="checkbox"
          name="enabled"
          value="1"
          onchange="this.form.submit()"
          {% if note.id in collected_note_ids %}checked{% endif %}
        >
        <span>{{ "S" if toggle_mode == "table" else "Sammlung" }}</span>
      </label>
    </form>
    <form method="post" action="{{ url_for('catalog.toggle_wishlist', note_id=note.id) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="next" value="{{ request.full_path }}">
      <label class="inline-flex items-center gap-2">
        <input
          class="h-4 w-4 rounded border-slate-300 text-slate-600"
          type="checkbox"
          name="enabled"
          value="1"
          onchange="this.form.submit()"
          {% if note.id in wishlist_note_ids %}checked{% endif %}
        >
        <span>{{ "W" if toggle_mode == "table" else "Wunschliste" }}</span>
      </label>
    </form>
  </div>
{% endif %}
