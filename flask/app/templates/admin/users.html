{% extends "base.html" %}
{% block content %}
<h1 class="mb-5 text-2xl font-semibold">Nutzer</h1>
<div class="overflow-x-auto rounded-lg border bg-white">
  <table class="min-w-full divide-y divide-slate-200 text-sm">
    <thead class="bg-slate-100 text-left"><tr><th class="px-4 py-3">Name</th><th class="px-4 py-3">E-Mail</th><th class="px-4 py-3">Admin</th><th class="px-4 py-3">Seit</th></tr></thead>
    <tbody class="divide-y divide-slate-100">
      {% for user in users %}
        <tr><td class="px-4 py-3">{{ user.username }}</td><td class="px-4 py-3">{{ user.email }}</td><td class="px-4 py-3">{{ "ja" if user.is_admin else "nein" }}</td><td class="px-4 py-3">{{ user.created_at.strftime("%Y-%m-%d") }}</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
