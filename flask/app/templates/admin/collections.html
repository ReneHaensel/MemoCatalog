{% extends "base.html" %}
{% block content %}
<h1 class="mb-5 text-2xl font-semibold">Sammlungseintraege</h1>
<div class="overflow-x-auto rounded-lg border bg-white">
  <table class="min-w-full divide-y divide-slate-200 text-sm">
    <thead class="bg-slate-100 text-left"><tr><th class="px-4 py-3">Nutzer</th><th class="px-4 py-3">Schein</th><th class="px-4 py-3">Variante</th><th class="px-4 py-3">Menge</th></tr></thead>
    <tbody class="divide-y divide-slate-100">
      {% for entry in entries %}
        <tr><td class="px-4 py-3">{{ entry.user.username }}</td><td class="px-4 py-3">{{ entry.base_note.title }}</td><td class="px-4 py-3">{{ entry.variant.variant_type if entry.variant else "-" }}</td><td class="px-4 py-3">{{ entry.quantity }}</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
