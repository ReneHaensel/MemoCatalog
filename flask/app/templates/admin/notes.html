{% extends "base.html" %}
{% block content %}
<div class="mb-5 flex items-center justify-between">
  <h1 class="text-2xl font-semibold">Hauptscheine</h1>
  <a class="rounded bg-emerald-700 px-4 py-2 text-sm font-medium text-white" href="{{ url_for('admin.note_new') }}">Neu</a>
</div>
<div class="overflow-x-auto rounded-lg border bg-white">
  <table class="min-w-full divide-y divide-slate-200 text-sm">
    <thead class="bg-slate-100 text-left"><tr><th class="px-4 py-3">Titel</th><th class="px-4 py-3">Land</th><th class="px-4 py-3">Nummer</th><th class="px-4 py-3">Variante</th><th></th></tr></thead>
    <tbody class="divide-y divide-slate-100">
      {% for note in notes %}
        <tr>
          <td class="px-4 py-3">{{ note.title }}</td>
          <td class="px-4 py-3">{{ note.country }}</td>
          <td class="px-4 py-3">{{ note.catalog_number or "-" }}</td>
          <td class="px-4 py-3">{{ note.variant_type or "-" }}</td>
          <td class="px-4 py-3 text-right"><a class="text-emerald-700 hover:underline" href="{{ url_for('admin.note_edit', note_id=note.id) }}">Bearbeiten</a></td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
